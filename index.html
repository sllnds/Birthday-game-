<!DOCTYPE html>
<html>
<head>
  <title>Birthday Mission</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sky">

  <div class="balloon balloon1"></div>
  <div class="balloon balloon2"></div>
  <div class="balloon balloon3"></div>

  <div class="heart heart1"></div>
  <div class="heart heart2"></div>
  <div class="heart heart3"></div>


  <div id="start-screen" class="screen active">

    <div class="pixel-duck">
      <div class="duck-hat"></div>
      <div class="duck-body">
        <div class="duck-eye left"></div>
        <div class="duck-eye right"></div>
        <div class="duck-beak"></div>
      </div>
    </div>

    <h1>HAPPY BIRTHDAY<br>ABDULRAHMAN</h1>

    <p>Welcome to your birthday mission</p>

    <button id="start-btn">
      START GAME
    </button>

  </div>


  <div id="quiz-screen" class="screen">

    <div class="pixel-duck small">
      <div class="duck-hat"></div>
      <div class="duck-body">
        <div class="duck-eye left"></div>
        <div class="duck-eye right"></div>
        <div class="duck-beak"></div>
      </div>
    </div>


    <div class="question-box">

      <h2 id="question"></h2>

      <div id="answers">
        <button class="answer"></button>
        <button class="answer"></button>
        <button class="answer"></button>
        <button class="answer"></button>
      </div>

    </div>

    <p id="duck-message"></p>

  </div>


  <div id="final-screen" class="screen">

    <div class="pixel-duck">
      <div class="duck-hat"></div>
      <div class="duck-body">
        <div class="duck-eye left"></div>
        <div class="duck-eye right"></div>
        <div class="duck-beak"></div>
      </div>
    </div>

    <h1>CONGRATULATIONS!</h1>

    <p>You completed the birthday mission</p>

    <div class="pixel-gift">
      <div class="gift-top"></div>
      <div class="gift-box"></div>
    </div>

    <p>Your final reward is waiting...</p>

    <button>
      UNLOCK MY GIFT
    </button>

  </div>

</div>


<script src="script.js"></script>

</body>
</html>
